# Postgres + pgAdmin for local development
# Better Auth uses PostgreSQL via Prisma. No local Postgres needed — Docker provides it.

services:
  postgres:
    image: postgres:16-alpine
    container_name: dobaeni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dobaeni
      POSTGRES_PASSWORD: dobaeni
      POSTGRES_DB: dobaeni
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dobaeni -d dobaeni"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dobaeni-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dobaeni.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin-data:
